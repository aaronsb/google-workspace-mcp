# Service manifest — declarative registry for the tool factory (ADR-300).
# Each entry produces one MCP tool via the generator.

services:
  gmail:
    tool_name: manage_email
    description: "Search, read, send, or triage emails in a Google Workspace account. Supports Gmail search syntax."
    requires_email: true
    gws_service: gmail
    operations:
      search:
        type: list
        description: "find emails by query"
        resource: users.messages.list
        params:
          query:
            type: string
            description: 'Gmail search query (e.g. "from:alice subject:meeting has:attachment")'
            maps_to: q
          maxResults:
            type: number
            description: "Max results for search (default: 10, max: 50)"
            default: 10
            max: 50
        defaults:
          userId: me
        hydration:
          resource: users.messages.get
          format: metadata
          headers: [From, Subject, Date]

      read:
        type: detail
        description: "get email by ID"
        resource: users.messages.get
        params:
          messageId:
            type: string
            description: "Email message ID (for read/reply)"
            required: true
            maps_to: id
        defaults:
          userId: me

      send:
        type: action
        description: "compose new email"
        helper: "+send"
        params:
          to:
            type: string
            description: "Recipient email (for send)"
            required: true
          subject:
            type: string
            description: "Email subject (for send)"
            required: true
          body:
            type: string
            description: "Email body text (for send/reply)"
            required: true
        cli_args:
          to: "--to"
          subject: "--subject"
          body: "--body"

      reply:
        type: action
        description: "reply to a thread"
        helper: "+reply"
        params:
          messageId:
            type: string
            description: "Email message ID (for read/reply)"
            required: true
          body:
            type: string
            description: "Email body text (for send/reply)"
            required: true
        cli_args:
          body: "--body"

      triage:
        type: list
        description: "inbox summary"
        helper: "+triage"

      forward:
        type: action
        description: "forward a message to new recipients"
        helper: "+forward"
        params:
          messageId:
            type: string
            description: "Message ID to forward"
            required: true
          to:
            type: string
            description: "Recipient email(s), comma-separated"
            required: true
          body:
            type: string
            description: "Optional additional text to prepend"
        cli_args:
          messageId: "--message-id"
          to: "--to"
          body: "--body"

      trash:
        type: action
        description: "move message to trash"
        resource: users.messages.trash
        params:
          messageId:
            type: string
            description: "Message ID to trash"
            required: true
            maps_to: id
        defaults:
          userId: me

      untrash:
        type: action
        description: "remove message from trash"
        resource: users.messages.untrash
        params:
          messageId:
            type: string
            description: "Message ID to restore from trash"
            required: true
            maps_to: id
        defaults:
          userId: me

      labels:
        type: list
        description: "list all labels in mailbox"
        resource: users.labels.list
        defaults:
          userId: me

  calendar:
    tool_name: manage_calendar
    description: "List events, view today's agenda, or create/update/delete calendar events."
    requires_email: true
    gws_service: calendar
    operations:
      list:
        type: list
        description: "upcoming events"
        resource: events.list
        params:
          timeMin:
            type: string
            description: "Start of range (ISO 8601) — defaults to today"
          timeMax:
            type: string
            description: "End of range (ISO 8601)"
          maxResults:
            type: number
            description: "Max events (default: 10, max: 50)"
            default: 10
            max: 50
        defaults:
          calendarId: primary
          singleEvents: true
          orderBy: startTime

      agenda:
        type: list
        description: "today at a glance"
        helper: "+agenda"

      create:
        type: action
        description: "new event"
        helper: "+insert"
        params:
          summary:
            type: string
            description: "Event title (for create)"
            required: true
          start:
            type: string
            description: "Start time ISO 8601 (for create)"
            required: true
          end:
            type: string
            description: "End time ISO 8601 (for create)"
            required: true
          description:
            type: string
            description: "Event description"
          location:
            type: string
            description: "Event location"
          attendees:
            type: string
            description: "Comma-separated attendee emails"
        cli_args:
          summary: "--summary"
          start: "--start"
          end: "--end"
          description: "--description"
          location: "--location"
          attendees: "--attendees"

      get:
        type: detail
        description: "event details"
        resource: events.get
        params:
          eventId:
            type: string
            description: "Event ID (for get/delete)"
            required: true
        defaults:
          calendarId: primary

      delete:
        type: action
        description: "remove event"
        resource: events.delete
        params:
          eventId:
            type: string
            description: "Event ID (for get/delete)"
            required: true
        defaults:
          calendarId: primary

      quickAdd:
        type: action
        description: "create event from natural language text (e.g. 'Lunch with Alice tomorrow at noon')"
        resource: events.quickAdd
        params:
          text:
            type: string
            description: "Natural language event description"
            required: true
        defaults:
          calendarId: primary

      update:
        type: action
        description: "update an existing event"
        resource: events.patch
        params:
          eventId:
            type: string
            description: "Event ID to update"
            required: true
          summary:
            type: string
            description: "Updated event title"
          start:
            type: string
            description: "Updated start time (ISO 8601)"
          end:
            type: string
            description: "Updated end time (ISO 8601)"
          description:
            type: string
            description: "Updated event description"
          location:
            type: string
            description: "Updated event location"
        defaults:
          calendarId: primary

  drive:
    tool_name: manage_drive
    description: "Search, upload, download, or read files in Google Drive."
    requires_email: true
    gws_service: drive
    operations:
      search:
        type: list
        description: "find files"
        resource: files.list
        params:
          query:
            type: string
            description: "Drive search query"
            maps_to: q
          maxResults:
            type: number
            description: "Max results (default: 10, max: 50)"
            default: 10
            max: 50
            maps_to: pageSize
        defaults:
          fields: "files(id, name, mimeType, modifiedTime, size, webViewLink)"

      get:
        type: detail
        description: "file metadata"
        resource: files.get
        params:
          fileId:
            type: string
            description: "File ID (for get/download)"
            required: true
        defaults:
          fields: "id, name, mimeType, modifiedTime, size, webViewLink, owners, shared"

      upload:
        type: action
        description: "upload local file"
        helper: "+upload"
        params:
          filePath:
            type: string
            description: "Local file path (for upload)"
            required: true
          name:
            type: string
            description: "File name in Drive (for upload, defaults to local name)"
          parentFolderId:
            type: string
            description: "Parent folder ID (for upload)"
        cli_args:
          name: "--name"
          parentFolderId: "--parent"

      download:
        type: detail
        description: "download file content"
        resource: files.get
        params:
          fileId:
            type: string
            description: "File ID (for get/download)"
            required: true
          outputPath:
            type: string
            description: "Local path to save downloaded file"
        defaults:
          alt: media

      copy:
        type: action
        description: "create a copy of a file"
        resource: files.copy
        params:
          fileId:
            type: string
            description: "File ID to copy"
            required: true
          name:
            type: string
            description: "Name for the copy"
          parentFolderId:
            type: string
            description: "Destination folder ID"

      listPermissions:
        type: list
        description: "list sharing permissions on a file"
        resource: permissions.list
        params:
          fileId:
            type: string
            description: "File ID to check permissions"
            required: true

      share:
        type: action
        description: "share a file with a user or group"
        resource: permissions.create
        params:
          fileId:
            type: string
            description: "File ID to share"
            required: true
          shareEmail:
            type: string
            description: "Email address to share with"
            required: true
          role:
            type: string
            description: "Permission role"
            enum: [reader, commenter, writer, organizer]
            default: reader
