tool_name: manage_docs
description: "Read, write, insert, and find-replace text in Google Docs documents."
requires_email: true
google_service: docs
operations:

  get:
    type: detail
    description: "get document content and metadata"
    resource: documents.get
    params:
      documentId:
        type: string
        description: "Document ID"
        required: true

  # `title` rides in the BODY — documents.create declares no parameters at all
  # (Discovery: `"parameters": {}`), so everything goes into the Document resource.
  # Without this the tool could only ever produce documents called "Untitled document",
  # and a caller passing a title got no error — the argument was simply not in the
  # schema, so it was dropped in silence. manage_sheets.create has always taken one.
  create:
    type: action
    description: "create a new document"
    resource: documents.create
    params:
      title:
        type: string
        description: "Document title (default: 'Untitled document')"

  # One documents.batchUpdate with a single insertText at endOfSegmentLocation —
  # append to end of body. It needs a request body, so it is a custom handler
  # rather than a bare resource op (docsPatch.write).
  write:
    type: action
    description: "append text to the end of a document"
    resource: documents.batchUpdate
    params:
      documentId:
        type: string
        description: "Document ID"
        required: true
      text:
        type: string
        description: "Text to append (plain text)"
        required: true

  insertText:
    type: action
    description: "insert text at a specific position in a document"
    resource: documents.batchUpdate
    params:
      documentId:
        type: string
        description: "Document ID"
        required: true
      text:
        type: string
        description: "Text to insert"
        required: true
      index:
        type: number
        description: "Character index to insert at (1 = start of document body)"
        required: true

  replaceText:
    type: action
    description: "find and replace text in a document"
    resource: documents.batchUpdate
    params:
      documentId:
        type: string
        description: "Document ID"
        required: true
      findText:
        type: string
        description: "Text to find"
        required: true
      replaceWith:
        type: string
        description: "Replacement text"
        required: true
      matchCase:
        type: boolean
        description: "Case-sensitive match (default: true)"
        default: true
