# One bundle, not five.
#
# This job used to run `make mcpb-all`, packing five bundles named for five platforms.
# With the gws executable gone (ADR-103) the payload is Node + pure JavaScript, so all
# five were byte-identical in content — the same 3191 files under the same content
# hash, each carrying a `npm ci --omit=dev` tree resolved right here on ubuntu-latest
# regardless of the platform in its name.
name: Build .mcpb release artifact

on:
  push:
    tags: ['v*']

jobs:
  build-mcpb:
    name: Build .mcpb bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh release upload
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build the .mcpb bundle
        run: make mcpb

      - name: Create GitHub Release (if not exists)
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload the .mcpb artifact to the release
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" google-workspace-mcp.mcpb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
